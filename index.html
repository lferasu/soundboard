<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Soundboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <h1>🎵 Super Soundboard 🎵</h1>
        <p>Tap a button to make a fun sound!</p>
      </header>

      <section class="board" aria-label="Soundboard with eight sound buttons">
        <button class="sound-btn" data-sound="laser" aria-label="Play laser sound">⚡ Laser</button>
        <button class="sound-btn" data-sound="robot" aria-label="Play robot sound">🤖 Robot</button>
        <button class="sound-btn" data-sound="boing" aria-label="Play boing sound">🌀 Boing</button>
        <button class="sound-btn" data-sound="bubble" aria-label="Play bubble pop sound">🫧 Bubbles</button>
        <button class="sound-btn" data-sound="drum" aria-label="Play drum sound">🥁 Drum</button>
        <button class="sound-btn" data-sound="chime" aria-label="Play chime sound">✨ Chime</button>
        <button class="sound-btn" data-sound="space" aria-label="Play space sound">🚀 Space</button>
        <button class="sound-btn" data-sound="clap" aria-label="Play clap sound">👏 Clap</button>
      </section>

      <footer>
        <small>Tip: You can also use keys 1-8 to play sounds.</small>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
